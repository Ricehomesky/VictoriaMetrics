name: Build and Push VMStorage Image

on:
  push:
    branches:
      - fix/nfs-panic-v1.144.0
    paths:
      - 'lib/fs/dir_remover.go'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build vmstorage binary
        run: make vmstorage-linux-amd64-prod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Ricehomesky
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          cd bin
          cp ../app/vmstorage/deployment/Dockerfile .
          docker build \
            --no-cache \
            -t ghcr.io/ricehomesky/vmstorage:v1.144.0-cluster-fix \
            -f Dockerfile \
            .
          docker push ghcr.io/ricehomesky/vmstorage:v1.144.0-cluster-fix
